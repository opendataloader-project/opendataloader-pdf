# skill-drift-check.yml
# Ensures skill references stay in sync with options.json when CLI options change.
# Runs sync-skill-refs.py and fails the check if drift is detected (exit code 1).

name: Skill Drift Check

on:
  push:
    paths:
      - 'skills/odl-pdf/SKILL.md'
      - 'skills/odl-pdf/references/**'
      - 'skills/odl-pdf/scripts/sync-skill-refs.py'
      - 'options.json'
      - '.github/workflows/skill-drift-check.yml'
  pull_request:
    paths:
      - 'skills/odl-pdf/SKILL.md'
      - 'skills/odl-pdf/references/**'
      - 'skills/odl-pdf/scripts/sync-skill-refs.py'
      - 'options.json'
      - '.github/workflows/skill-drift-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check skill drift
        run: |
          set +e
          python skills/odl-pdf/scripts/sync-skill-refs.py
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 1 ]; then
            echo ""
            echo "Drift detected: a referenced option name/value/default in SKILL.md or"
            echo "references/ is not in options.json (or a registered value/default is stale)."
            echo "Fix the reference, or update the registry (SERVER_OPTIONS/EXCLUDED_TOKENS/"
            echo "REFERENCED_VALUES/REFERENCED_DEFAULTS) in skills/odl-pdf/scripts/sync-skill-refs.py."
            exit 1
          elif [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "Drift check failed due to an input/script error (exit $EXIT_CODE)."
            exit $EXIT_CODE
          fi
